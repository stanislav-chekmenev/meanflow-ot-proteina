run_name_: train_run_1gpu

hardware:
  ncpus_per_task_train_: 24  # Number of CPUs per tast during training
  ncpus_per_task_prepro_: 32  # Number of CPUs used for data preprocessing run
  accelerator: gpu
  ngpus_per_node_: 1  # Number of GPUs per node
  nnodes_: 1  # Number of nodes

# Below, for t_distribution, options are
# - name: uniform. p2 is the maximum time that we can sample (<=1, p1 is ignored).
# - name: logit-normal (normal + sigmoid). p1 is the mean of the normal, p2 the std (>0).
# - name: beta. This is beta(p1, p2).
loss:
  t_distribution:
    name: mix_up02_beta
    p1: 1.9
    p2: 1.0
  loss_t_clamp: 0.9  # Used for loss stability in frameflow, 1. for no clamping
  use_aux_loss: False  # Unused in MeanFlow training
  aux_loss_t_lim: 0.3  # Time limit to apply auxiliary loss
  thres_aux_2d_loss: 0.6  # This is nm not Å
  aux_loss_weight: 1.0
  num_dist_buckets: 64  # Number of buckets to discretize the pairwise distance
  max_dist_boundary: 1.0  # Given by nanometer


defaults:
  - model: caflow  # caflow or frameflow
  - _self_

# Dataset params
dataset: pdb_train
dataset_config_subdir: pdb

force_precision_f32: False  # If false will use bf16-mixed precision

training:
  loss_accumulation_steps: 1
  self_cond: False           # Opt-in self-conditioning for MeanFlow
  self_cond_prob: 0.5        # Probability of activating x_sc per step
  fold_cond: False
  mask_T_prob: 0.5
  mask_A_prob: 0.5
  mask_C_prob: 0.5
  fold_label_sample_ratio: [0.5, 0.1, 0.15, 0.25]   # Training proportion for [None, C, CA, CAT]. If specified, will override mask_{C,A,T}_prob
  ot_coupling:
    enabled: True
    method: exact
    reg: 0.05
    reg_m: 1.0
    normalize_cost: False
    ot_pool_size: 128   # Enable streaming OT pool by setting to a multiple of batch_size; null disables it.
  meanflow:
    ratio: 0.25
    P_mean_t: -0.4
    P_std_t: 1.0
    P_mean_r: -0.4
    P_std_r: 1.0
    norm_p: 1.0
    norm_eps: 0.001
    nsteps_sample: 1
  chirality_loss:
    enabled: False           # Opt-in chirality hinge loss (signed triple products)
    weight: 1.0              # Multiplier on hinge loss in total loss
    margin_alpha: 0.1        # Per-element margin as alpha * |T_gt_i|
    stride: 1                # Stride k for triple-product window
    t_gate_max: 1.0          # Upper t cutoff for applying the hinge (default 1.0 = no gate)
    t_gate_mode: "hard"      # "hard" (indicator) or "soft" (sigmoid)

opt:
  lr: 0.0001
  init_lr: 0.0  # Starting LR at the beginning of warmup (0 = warmup from zero)
  end_lr: 0.0  # Minimum LR after decay (0 = decay all the way to zero)
  warmup_steps: 0  # Number of linear warmup steps (0 = no warmup)
  lr_decay_total_steps: 0  # Total steps for warmup + linear decay schedule (0 = constant LR)
  max_epochs: 10000000
  log_every_n_steps: 1  # For wandb
  accumulate_grad_batches: 1
  val_check_interval: 50  # Dataloader batches between val runs (NOT optimizer steps; multiply by accumulate_grad_batches to get opt-step cadence)
  skip_nan_grad: False  # Skip updates with nan gradient
  grad_and_weight_analysis: False  # Log some statistics of gradients and weights
  dist_strategy: ddp  # For multi GPU training, do not change

log:
  wandb_project: meanflow-ot-proteina  # Leave this so we can compare runs easily
  wandb_entity: null  # W&B team/entity (null = personal account)
  wandb_run_name: null  # Display name override (null = use run_name_)
  log_wandb: True  # whether to log to wandb
  checkpoint: True  # whether to store checkpoints
  resume_from_last_ckpt: True  # If True and last.ckpt exists, resume from it; if False, ignore any existing ckpt and start fresh (old ckpts are NOT deleted)
  checkpoint_every_n_steps: 10000  # Optimizer steps (trainer.global_step) — unlike val_check_interval, NOT affected by accumulate_grad_batches
  last_ckpt_every_n_steps: 5000  # Optimizer steps between "last" ckpt updates (for requeuing); same unit as checkpoint_every_n_steps
  top_k_by_val_loss: 3  # Keep this many best-val-loss checkpoints (mode=min on val/raw_loss_mf_epoch). 0 = keep only the "last" ckpt.

seed: 42

ema:
  decay: 0.999  # 0 means no EMA, so all the EMA machinery is unused and no EMA checkpoints are stored
  validate_original_weights: False  # Whether to run validation on regular or EMA weights
  every_n_steps: 1  # Frequency of EMA updates
  cpu_offload: False  # Whether to offload EMA weights to cpu

eval:
  enabled: True
  every_n_steps: 1000
  n_samples: 8
  lengths: [64, 128, 192, 256]
  nsteps: 1

fid:
  enabled: True
  eval_every_n_steps: 10000
  n_samples: 5000
  lengths: [64, 100, 128, 150, 192, 200, 250, 256]
  nsteps: 1
  generation_batch_size: 32
  gearnet_ckpt_path: ./data/metric_factory/model_weights/gearnet_ca.pth
  real_features_path: ./data/metric_factory/features/pdb_eval_ca_features.pth
